services:
  bird-workflow:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ~/Downloads:/downloads
      - ~/Desktop/bird_staging:/staging
      - ~/Desktop/birds:/birds
      - "~/Library/Application Support/Google/Chrome/Default/Cookies:/chrome-cookies/Cookies:ro"

    environment:
      - BUFFER_TOKEN=${BUFFER_TOKEN}
      - BUFFER_COOKIES=${BUFFER_COOKIES}
      - MAC_HOME=/Users/scott
    restart: unless-stopped
